schema_version: 3.0.0
document_version: 0.1.0
last_updated: '2026-06-12'
metadata:
  maintained_by: Your Team
  review_frequency: Monthly
  related_docs:
    - docs/README.md
  tools:
    roadmap_tracking: roadmap.yaml
    task_tracking: gitban cards
    Gitban_mcp: https://github.com/muunkky/gitban-mcp
milestones:
  m2:
    id: m2
    title: Memory SDK — Road to 1.0
    description: 'FORWARD-LOOKING. Honestly-grounded stabilization candidates for
      a 1.0, derived ONLY from confirmed spec_vs_sdk_gaps (SDK omits documented spec
      capabilities, or diverges from the spec wire contract) plus the explicit pre-1.0
      signal in RELEASING.md. Each node is a stub: status todo, basis in notes, and
      EMPTY tdd_spec where no test or behavior exists yet (empty beats fabricated).
      These are NOT committed work — they capture where the SDK and the OpenAPI spec/memory.json
      have drifted, for a maintainer to triage before locking the 1.0 contract. No
      gitban/.claude tooling work belongs here. Docs: spec/memory.json, RELEASING.md.'
    status: in_progress
    docs_ref: spec/memory.json
    stories:
      s5:
        id: s5
        title: The SDK and the documented API contract are reconciled for a
          stable 1.0
        description: "FORWARD-LOOKING OBJECTIVE (candidate): the SDK either faithfully
          surfaces the spec/memory.json contract or the spec is updated to match the
          SDK's actual target, so a 1.0 consumer can rely on auth, error codes, endpoints,
          and the filter DSL behaving as documented. Note (from the api-contract slice):
          the SDK appears to target a NEWER/divergent API than memory.json (it adds
          /v1/groups, group_ids, mode, recall) while the spec lags it — so this reconciliation
          runs in BOTH directions. Every feature below is a confirmed spec_vs_sdk_gap;
          none is committed. Basis: api-contract and types spec_vs_sdk_gaps cross-checked
          against src/ and spec/memory.json; pre-1.0 minor-bump policy in RELEASING.md.
          No work has started."
        status: in_progress
        success_criteria:
          - 'Every confirmed SDK↔spec divergence (error-envelope shape, auth header
            form, rate-limit headers, PATCH/update endpoint) is triaged to a recorded
            decision: align the SDK, or correct spec/memory.json.'
          - A 1.0 consumer can rely on auth, error codes, endpoints, and the
            filter DSL behaving exactly as documented — the SDK surface and
            spec/memory.json no longer contradict each other.
          - Each m2 feature is either implemented or explicitly closed as
            won't-do with a rationale, so no silent spec drift remains at the
            1.0 cut.
        projects:
          spec-contract-alignment:
            id: spec-contract-alignment
            title: Spec ↔ SDK contract alignment
            description: "Confirmed divergences between the SDK and spec/memory.json:
              error wire shape, auth header form, missing PATCH/update endpoint, and
              unsurfaced rate-limit headers. Each is a 1.0 decision point (align the
              SDK, or update the spec to match the SDK's actual target API)."
            docs_ref: docs/adr/ADR-001-sdk-spec-reconciliation-policy.md
            status: todo
            features:
              error-envelope-mismatch:
                id: error-envelope-mismatch
                title: Resolve error-envelope wire-shape mismatch
                description: "Candidate: the spec documents errors as {detail:{code,message}}
                  (and 422 as {detail:[{loc,msg,type}]}), but src/http.ts:toError
                  parses {error:{type,code,message}} (ApiErrorBody). Against the documented
                  API, detail.code is never extracted, so MemoryError.code falls back
                  to 'unknown_error' and typed subclasses can't switch on the spec's
                  stable codes. Reconcile which shape the live API actually returns
                  and align one side."
                sequence: 1
                status: todo
                docs_ref: spec/memory.json
                notes: "Basis: api-contract spec_vs_sdk_gap. src/http.ts:118 reads
                  parsed.error; src/errors.ts:errorForStatus code default 'unknown_error';
                  spec error envelope {detail:{code,message}} documented in spec/memory.json
                  info.description (verified). No test/behavior to ground a spec yet
                  — empty tdd_spec."
              auth-header-form:
                id: auth-header-form
                title: Reconcile auth header form
                description: "Candidate: spec securitySchemes accept only 'Authorization:
                  Token <key>' or 'x-api-key: <key>' (always with X-Org-Id), but the
                  SDK sends 'Authorization: Bearer <key>'. Neither spec-accepted scheme
                  is used. Determine which scheme the live API honors and align the
                  SDK or the spec for 1.0."
                sequence: 2
                status: todo
                docs_ref: spec/memory.json
                notes: "Basis: api-contract spec_vs_sdk_gap. src/http.ts:43-48 (Bearer);
                  spec securitySchemes (verified spec/memory.json:1819-1830: x-api-key
                  + Authorization: Token, bearerFormat 'Token'). The SDK's Bearer
                  form may reflect the newer target API — direction unresolved. Empty
                  tdd_spec."
              rate-limit-headers:
                id: rate-limit-headers
                title: Surface RateLimit-Limit/Remaining/Reset response headers
                description: "Candidate: the spec documents RateLimit-Limit/Remaining/Reset
                  bucket-state headers on every response, but the SDK reads only Retry-After
                  (429) and x-request-id — there's no way for a caller to proactively
                  throttle. A 1.0 could parse and expose these."
                sequence: 3
                status: todo
                docs_ref: spec/memory.json
                notes: 'Basis: api-contract spec_vs_sdk_gap. src/http.ts reads only
                  retry-after + x-request-id; spec RateLimit-* headers documented
                  (verified spec/memory.json info.description + 429 descriptions).
                  Empty tdd_spec — no behavior exists yet.'
              update-endpoint:
                id: update-endpoint
                title: Implement PATCH /v1/memories/{id} update endpoint
                description: "Candidate (single largest missing endpoint): the spec
                  defines a full PATCH update — UpdateRequest{text?, metadata?}: a
                  text change supersedes a fact, a metadata change merges in place,
                  with codes immutable_field/reserved_field/empty_text_field/invalid_request.
                  The SDK has no update/patch method and delete()'s docstring asserts
                  (per spec, wrongly) the API has no update endpoint. Confirm the
                  endpoint exists on the live API before building."
                sequence: 4
                status: todo
                docs_ref: spec/memory.json
                notes: 'Basis: api-contract spec_vs_sdk_gap (largest). Spec defines
                  PATCH /v1/memories/{memory_id} with UpdateRequest (verified spec/memory.json:596-656);
                  src/memories.ts has no update. NOTE: update() existed historically
                  and was removed in a7da7a9 (PR #6) because the server returned 405
                  — so the spec may simply be stale here. Resolve the contradiction
                  before any work. Empty tdd_spec.'
          search-capabilities:
            id: search-capabilities
            title: Spec search capabilities not yet surfaced
            description: "Documented search-side spec capabilities the SDK doesn't
              expose: a typed filter DSL, the include[] mechanism on search, and search-cursor
              auto-iteration. Forward candidates for a richer 1.0 retrieval surface."
            docs_ref: docs/designs/m2-1.0-spec-reconciliation-and-surface.md
            status: todo
            features:
              typed-filter-dsl:
                id: typed-filter-dsl
                title: Typed filter DSL builder
                description: "Candidate: the spec's full operator set ($eq/$ne/$in/$nin/$exists/$gt/$gte/$lt/$lte/$between,
                  AND/OR/NOT, implicit-AND, null=unset, metadata-key filtering) lives
                  behind SearchRequest.filters, but the SDK exposes only flat scope
                  axes and keeps Filter = Record<string, unknown> as an @deprecated
                  untyped escape hatch. A typed operator/builder API is a forward
                  candidate."
                sequence: 1
                status: todo
                docs_ref: spec/memory.json
                notes: 'Basis: types + api-contract spec_vs_sdk_gaps. src/types.ts:Filter
                  L160 (@deprecated path). Spec DSL operator table in spec/memory.json
                  info.description (verified). Empty tdd_spec.'
              search-include-mechanism:
                id: search-include-mechanism
                title: First-class include[] on search (full_content /
                  context_prompt)
                description: "Candidate: the spec's include:['full_content','context_prompt']
                  mechanism on search and the resulting extras block are only partially
                  wired — retrieve() uses a non-spec mode:'compose' field instead
                  of include=['context_prompt'], and there's no first-class accessor
                  for ArtifactDetails.full_content via search include (only the list
                  include param is plumbed). RecallParams exposes no include[] at
                  all."
                sequence: 2
                status: todo
                docs_ref: spec/memory.json
                notes: 'Basis: types + api-contract spec_vs_sdk_gaps. src/memories.ts
                  retrieve uses mode; SearchListEnvelope.context/extras types.ts:153-156;
                  full_content types.ts:46. Empty tdd_spec.'
              search-auto-pager:
                id: search-auto-pager
                title: searchAll() cursor auto-iterator
                description: 'Candidate: list has an async-generator auto-pager (memories.list),
                  but search returns a SearchListEnvelope with cursor/next_cursor/has_more
                  and there is no equivalent searchAll() generator — callers must
                  hand-roll cursor threading. A 1.0 could add the symmetric auto-pager.'
                sequence: 3
                status: todo
                docs_ref: spec/memory.json
                notes: 'Basis: api-contract spec_vs_sdk_gap. src/memories.ts:list
                  auto-pages (480-488) but search (240-247) does not. Empty tdd_spec.'
          type-surface-finalization:
            id: type-surface-finalization
            title: Type-surface finalization toward 1.0
            description: 'Forward type-surface work the source itself flags: wire
              in the canonical generated types over the hand-authored interim, and
              model declared-but-unwired fields (expanded, server-supplied prompt
              templates, superseded-chain resolution).'
            docs_ref: docs/adr/ADR-002-type-surface-source-of-truth.md
            status: todo
            features:
              wire-generated-types:
                id: wire-generated-types
                title: Wire in canonical generated types
                description: 'Per ADR-002: the hand-authored src/types.ts is the canonical
                  1.0 public surface; src/generated/types.ts is a spec-derived REFERENCE
                  artifact (regenerated from spec/memory.json via npm run gen:types),
                  not promoted to the public surface. The src/types.ts:1-2 header
                  now references spec/memory.json (the gen:types source); the former
                  phantom source-of-truth pointer (a non-existent openapi path) is
                  gone. A reproducibility guard (npm run check:types-sync = gen:types
                  + git diff --exit-code -- src/generated/types.ts, chained into prepublishOnly)
                  keeps the committed reference provably in sync with the spec.'
                sequence: 1
                status: todo
                docs_ref: spec/memory.json
                notes: "Resolved (M2RECON step 7, card f5ddyp). The src/types.ts:1-2
                  header SoT pointer was corrected from a non-existent openapi spec
                  path to spec/memory.json (matching package.json:49 gen:types). src/generated/types.ts
                  was regenerated from the reconciled 1.0 spec (after step 2A's ADR-001
                  annotations) and is kept honest by the check:types-sync guard. Disposition
                  per ADR-002: the generated surface is NOT wired in over the hand-authored
                  one — hand-authored stays canonical, generated stays a reference.
                  Conformance assertions (expectAssignable) are an optional ADR-002
                  follow-up, not a 1.0 precondition."
              model-expanded-and-templates:
                id: model-expanded-and-templates
                title: Wire request-side triggers for declared-but-unused fields
                description: "Candidate: Memory.expanded (types.ts:74) is a declared
                  expansion field with no request-side trigger (no expand param on
                  Search/List/Recall); PromptTemplate is forward-looking by its own
                  doc (a future API endpoint could return xmem's preferred template,
                  fetched/cached — only a client-side default exists today); and IngestResult.memories_superseded_by
                  + stage_timings are typed but have no SDK helper to resolve a superseded
                  chain or fetch the new fact. All convenience/forward gaps, not missing
                  endpoints."
                sequence: 2
                status: todo
                notes: 'Basis: types + api-contract spec_vs_sdk_gaps. Memory.expanded
                  types.ts:74; PromptTemplate types.ts:283 doc; memories_superseded_by
                  in IngestJobResult. Empty tdd_spec — no behavior to ground.'
        docs_ref: docs/designs/m2-1.0-spec-reconciliation-and-surface.md
  m1:
    id: m1
    title: Memory SDK — TypeScript client for the xtrace memory API
    description: 'The published @xtraceai/memory SDK: a hand-written TypeScript client
      (Node 18+, dual ESM/CJS) for the xtrace hosted memory API. Covers the full memory
      lifecycle (ingest/jobs/search/list/get/delete), a pools-union recall() for blended
      personal+shared retrieval, a Vercel AI SDK integration subpath, and a manual
      release pipeline. Published at 0.2.1, pre-1.0, so the milestone is in_progress
      until 1.0. Docs: README.md, RELEASING.md, spec/memory.json.'
    status: in_progress
    docs_ref: README.md
    start_date: '2026-05-15'
    stories:
      s1:
        id: s1
        title: A developer can manage the full memory lifecycle against the
          hosted API
        description: 'OBJECTIVE: a developer can install the SDK, configure a client
          with apiKey+orgId, and exercise the complete memory lifecycle — ingest (async
          + sync wait), poll extraction jobs, search (scoped), list (auto-paginate),
          get by id, and hard-delete — over an authenticated, retry-hardened HTTP
          transport that surfaces typed errors. Grounded in core-client / memories-recall
          / groups-jobs-types slices; all shipped. Transport/lifecycle paths are exercised
          indirectly (http client faked in recall.test.ts); no client.test.ts / http.test.ts
          / jobs.test.ts exist, so most tdd_specs are empty rather than fabricated.'
        status: done
        success_criteria:
          - A MemoryClient built from apiKey+orgId exposes working memories and
            groups namespaces over an authenticated retry-hardened transport
            (src/client.ts, src/http.ts).
          - ingest writes turns async-by-default and sync via wait:true,
            returning an IngestJob; jobs poll to a terminal state via
            client.memories.jobs.pollUntilDone (src/memories.ts ingest 206-215,
            src/jobs.ts pollUntilDone 27).
          - search/list/get/delete cover the read+manage surface with
            auto-pagination on list (src/memories.ts 240-508).
          - Every API error surfaces as a typed MemoryError subclass with
            body-derived code (src/errors.ts, README.md:162-178).
        projects:
          client-foundation:
            id: client-foundation
            title: Client construction, config, and HTTP transport
            description: MemoryClient is the single public entrypoint, built
              from MemoryClientOptions, with a native-fetch HTTP transport that
              handles auth headers, request-id generation/echo, query building,
              retries, and Retry-After.
            docs_ref: README.md
            status: done
            features:
              memory-client-construction:
                id: memory-client-construction
                title: MemoryClient construction + required-field validation
                description: 'new MemoryClient(options) validates required apiKey
                  and orgId (throws plain Error when falsy), builds an HttpClient
                  via defaultHttpConfig, and exposes readonly memories: Memories and
                  groups: Groups namespaces.'
                sequence: 1
                status: done
                docs_ref: README.md
                notes: src/client.ts:MemoryClient constructor (lines 24-40);
                  fields lines 21-22. MemoryClient exposes ONLY readonly
                  memories and groups directly; Jobs is reachable via
                  client.memories.jobs (Jobs is constructed inside Memories —
                  src/memories.ts:190/193 readonly jobs), the documented path in
                  README.md:75 (client.memories.jobs.pollUntilDone). There is no
                  top-level client.jobs. README.md:60-65 quickstart
                  construction.
              client-options-surface:
                id: client-options-surface
                title: MemoryClientOptions config surface
                description: 'Public options interface: apiKey (xtk_…, required),
                  orgId (required, paired on every request), baseUrl? (default https://api.production.xtrace.ai),
                  fetch? (injectable), maxRetries? (default 2), requestIdFactory?
                  (default req_<uuid>). requestIdFactory wires into config as defaultRequestId.'
                sequence: 2
                status: done
                docs_ref: README.md
                notes: src/client.ts:MemoryClientOptions (lines 5-18); mapping
                  into defaultHttpConfig client.ts:28-37; index.ts:2 exports
                  MemoryClientOptions. sleep is overridable at HttpClientConfig
                  level but NOT surfaced on MemoryClientOptions
                  (spec_vs_sdk_gap).
              default-http-config:
                id: default-http-config
                title: defaultHttpConfig defaults
                description: 'defaultHttpConfig fills HttpClientConfig defaults: baseUrl
                  ?? https://api.production.xtrace.ai, fetch ?? globalThis.fetch.bind(globalThis),
                  maxRetries ?? 2, and always sets the real defaultSleep. Internal
                  to the package (not re-exported from index.ts).'
                sequence: 3
                status: done
                notes: src/http.ts:defaultHttpConfig (lines 129-146);
                  defaultSleep line 22. Confirmed absent from index.ts
                  (internal).
              fetch-transport-query:
                id: fetch-transport-query
                title: Native fetch transport with URL/query building
                description: HttpClient.request builds new URL(path, baseUrl),
                  appends query params (skipping null/undefined, String-coercing
                  the rest), JSON-stringifies body only when present (adding
                  Content-Type), and returns { body, status, requestId }. 204
                  short-circuits to undefined body; response parsed via safeJson
                  (null on parse failure).
                sequence: 4
                status: done
                notes: src/http.ts:HttpClient.request (lines 33-100); 204
                  handling lines 79-81; safeJson lines 109-115.
              auth-and-headers:
                id: auth-and-headers
                title: Auth and standard request headers
                description: 'Every request sets Authorization: Bearer <apiKey>, X-Org-Id:
                  <orgId>, X-Request-Id: <requestId>, Accept: application/json. Content-Type
                  added only when a body is present.'
                sequence: 5
                status: done
                notes: "src/http.ts headers literal (lines 43-48). GROUNDING CORRECTION:
                  SDK uses Bearer + X-Org-Id, NOT 'Authorization: Token' or 'x-api-key'
                  (diverges from spec/memory.json securitySchemes — see m2 spec-alignment)."
              request-id-generation-echo:
                id: request-id-generation-echo
                title: Request-id generation and echo
                description: "Per-request id precedence: options.requestId ?? config.defaultRequestId?.()
                  ?? makeRequestId() (crypto.randomUUID → req_<uuid>, else base36
                  fallback). Sent as X-Request-Id; the response's x-request-id is
                  read back (falling back to the sent id) and attached to results
                  and errors."
                sequence: 6
                status: done
                notes: src/http.ts:makeRequestId (lines 24-28); id precedence
                  line 41; response echo line 77.
              retry-policy:
                id: retry-policy
                title: Retry policy with exponential backoff
                description: 'Retries gated by attempt < maxRetries and not aborted:
                  network throws retry only on idempotent (GET/HEAD); 429 (RateLimited)
                  retries on any method; 5xx (ServerError) retries only on GET/HEAD.
                  backoffMs = min(250*2^(attempt-1), 5000) + 0-99ms jitter.'
                sequence: 7
                status: done
                notes: 'src/http.ts: idempotent line 56; network retry lines 68-75;
                  retryable predicate line 91; backoffMs lines 103-107.'
              retry-after-honored:
                id: retry-after-honored
                title: Retry-After honored on 429
                description: On 429 the server's Retry-After (seconds,
                  Number-coerced when finite) takes precedence over exponential
                  backoff. Only 'retry-after' is parsed — no X-RateLimit-*
                  bucket headers are read.
                sequence: 8
                status: done
                notes: 'src/http.ts: retry wait selection line 94; toError retry-after
                  parse lines 119-125; errors.ts:errorForStatus passes retryAfter
                  line 63. RateLimit-Limit/Remaining/Reset NOT surfaced (spec_vs_sdk_gap
                  → m2).'
          ingest-and-jobs:
            id: ingest-and-jobs
            title: Ingest and extraction-job polling
            description: memories.ingest writes conversation turns (async by
              default, sync via wait:true, extract_artifacts defaulting true)
              returning an IngestJob; client.memories.jobs
              (Jobs.get/pollUntilDone) drives the extraction lifecycle to a
              terminal state.
            docs_ref: README.md
            status: done
            features:
              ingest-async-sync:
                id: ingest-async-sync
                title: ingest — async default + ?wait=true sync,
                  extract_artifacts default true
                description: "Memories.ingest POSTs /v1/memories and always returns
                  an IngestJob. Default async (202 + job_id); wait:true appends ?wait=true
                  so the server finishes extraction inline up to ~30s, falling back
                  to async. Payload sets extract_artifacts: body.extract_artifacts
                  ?? true (SDK default true, a deliberate divergence from the spec's
                  server-side default false)."
                sequence: 1
                status: done
                docs_ref: README.md
                notes: src/memories.ts:Memories.ingest (lines 206-215);
                  IngestOptions (lines 173-182); extract_artifacts default line
                  207. README.md:67-89 ingest quickstart. extract_artifacts
                  default flipped to true in commit d9eb8eb (v0.1.1).
              jobs-poll-until-done:
                id: jobs-poll-until-done
                title: Jobs.get + pollUntilDone polling surface
                description: Jobs.get GETs /v1/memories/jobs/{id} → IngestJob.
                  pollUntilDone loops until status is terminal
                  (succeeded|failed) with exponential backoff (defaults
                  timeoutMs 60_000, initialIntervalMs 500, maxIntervalMs 5_000,
                  backoffFactor 1.5), throwing a descriptive Error on timeout
                  and AbortError on abort. Reachable as client.memories.jobs.
                sequence: 2
                status: done
                docs_ref: README.md
                notes: 'src/jobs.ts: PollOptions L4, class Jobs L12, get L15, pollUntilDone
                  L27 (defaults L28-31, terminal check L38, timeout throw L41, abort
                  L36/L52). NO jobs.test.ts exists in the repo — pollUntilDone has
                  no test coverage, so tdd_spec is correctly left empty (not fabricated).
                  README.md:75 documents client.memories.jobs.pollUntilDone usage.'
          retrieval-management:
            id: retrieval-management
            title: Search, list, get, and delete
            description: 'The read/manage surface: scoped vector+filter search (and
              retrieve sugar), an auto-paginating list iterator plus cursor-level
              listPage, get-by-id, and hard delete.'
            docs_ref: README.md
            status: done
            features:
              search-retrieve:
                id: search-retrieve
                title: search — vector + filter search; retrieve sugar
                description: Memories.search POSTs /v1/memories/search with the
                  SearchRequest passed through verbatim (scope axes
                  user_id/group_ids/agent_id/app_id and any filter DSL forwarded
                  untouched), returning a SearchListEnvelope. retrieve forces
                  mode:'compose' for the server-assembled context prompt.
                sequence: 1
                status: done
                docs_ref: README.md
                notes: src/memories.ts:search (lines 240-247), retrieve (lines
                  255-257). Body passthrough is what recall relies on.
                  README.md:92-95 search quickstart.
              list-autopaginate:
                id: list-autopaginate
                title: list — auto-paginating async iterator + listPage cursor
                  control
                description: list is an async generator that yields every
                  matching Memory, auto-paginating until has_more is false /
                  next_cursor absent. listPage GETs /v1/memories with explicit
                  query params (user_id, agent_id, conv_id, app_id, type,
                  cursor, limit, order, include) for cursor-level control.
                sequence: 2
                status: done
                docs_ref: README.md
                notes: 'src/memories.ts:list async generator (lines 480-488); listPage
                  (lines 491-508). README.md:104-106 list quickstart. NOTE: no equivalent
                  searchAll() auto-pager for search (spec_vs_sdk_gap → m2).'
              get-by-id:
                id: get-by-id
                title: get — fetch single memory by id
                description: Memories.get GETs
                  /v1/memories/{encodeURIComponent(id)} and returns the full
                  Memory representation; honors signal/requestId via
                  RequestContext.
                sequence: 3
                status: done
                docs_ref: README.md
                notes: src/memories.ts:get (lines 218-224). README.md:108-109
                  get quickstart.
              delete-hard:
                id: delete-hard
                title: delete — hard delete, idempotent by absence
                description: Memories.delete DELETEs
                  /v1/memories/{encodeURIComponent(id)} → void; documented as a
                  hard delete (afterwards get returns 404, gone from
                  list/search, a second delete 404s). Corrections flow through
                  ingest — no PATCH/update endpoint on the SDK.
                sequence: 4
                status: done
                docs_ref: README.md
                notes: "src/memories.ts:delete (lines 232-237); JSDoc lines 226-231.
                  README.md:111-112 delete quickstart. NOTE: SDK docstring's hard-delete
                  claim diverges from spec's fact soft-delete semantics; spec PATCH/update
                  endpoint unimplemented (spec_vs_sdk_gap → m2)."
          types-and-errors:
            id: types-and-errors
            title: Public types and typed error hierarchy
            description: The hand-authored public type surface (Memory
              discriminated union, job/ingest/search/recall/envelope/template
              types) and a MemoryError base with eight status-mapped subclasses,
              all re-exported from index.ts.
            docs_ref: README.md
            status: done
            features:
              memory-error-hierarchy:
                id: memory-error-hierarchy
                title: MemoryError base + status→class mapping
                description: MemoryError (status, errorType, code, requestId,
                  details; name = subclass) with eight subclasses (BadRequest,
                  Unauthorized, Forbidden, MemoryNotFound, Conflict,
                  Unprocessable, ServerError, RateLimited{retryAfter}).
                  errorForStatus maps 400/401/403/404/409/422/429/>=500; other
                  statuses fall through to base.
                sequence: 1
                status: done
                docs_ref: README.md
                notes: src/errors.ts:MemoryError (lines 1-24), subclasses
                  (26-41), errorForStatus (57-65); index.ts:12-22 re-exports.
                  README.md:162-178 error-handling example (MemoryNotFound,
                  RateLimited.retryAfter).
              error-body-derivation:
                id: error-body-derivation
                title: error.code / errorType / message derived from API body
                description: "errorForStatus builds args from the parsed error body:
                  errorType = body?.type ?? 'api_error', code = body?.code ?? 'unknown_error',
                  message default 'Memory API request failed with status <status>',
                  details = body?.details. code comes from the body, NOT the HTTP
                  status; body is extracted as (parsed as ApiErrorBody)?.error."
                sequence: 2
                status: done
                notes: 'src/errors.ts:errorForStatus args (49-56); http.ts:toError

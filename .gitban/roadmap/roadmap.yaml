            arbitrary scope pools rendered into one prompt, verified by 28
            recall.test.ts cases (src/memories.ts:298-474, src/recall.test.ts).
          - Malformed pools (empty, zero-axis, non-array group_ids) throw before
            any search is issued (src/recall.test.ts pool-validation cases).

# .gitban/scaffold.yaml
# Copy this file to .gitban/scaffold.yaml and uncomment what you want to customize.
#
# For full documentation, see:
#   docs/adr/ADR-037-scaffold-configuration-override-semantics.md

# Variables -- override default values used across skill templates.
# variables:
#   git_handle: "CAMERON"    # used by: gitban-dispatcher
#   venv_python_command: ".venv/Scripts/python.exe"    # used by: gitban-dispatcher, gitban-reviewer, gitban-router, gitban-sprint-architect, gitban-sprint-closeout-reviewer, gitban-sprintmaster
#   venv_run_prefix: "bash scripts/venv-python"    # used by: gitban-executor

# Overrides -- replace entire shared fragments with your own content.
# Value can be inline text or a file path (e.g., ./my-profiling.md).
# overrides:
#   conventions: ./my-overrides/conventions.md      # used by: gitban-executor, gitban-reviewer
#   profiling: ./my-overrides/profiling.md      # used by: gitban-executor, gitban-planner, gitban-reviewer, gitban-router
